<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation CSS</title>
    <style>
        .btn {
            background-color: aqua;
            color: black;
            padding: 12px 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease,
                        transform 0.2s ease,
                        box-shadow 0.3s ease;
        }
        .btn:hover {
            background-color: blue;
            transform: translateX(-10px);
            box-shadow: 0 8px 20px black;
        }
        .btn:active {
            transform: translateX(0);
            box-shadow: none;
        }
        .card-container {
            perspective: 1000px;
        }
        .card {
            border: solid;
            border-radius: 8px;
            width: 200px;
            height: 300px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card:hover {
            transform: rotateY(180deg);
        }
        .card-front,
        .card-back {
            position: absolute;
            backface-visibility: hidden;
        }
        .card-front {
            background: lightblue;
        }
        .card-back { 
            transform: rotateY(180deg);
            background: lightcoral;
        }
        .box {
            width: 100px;
            height: 100px;
            background-color: royalblue;
            transition: transform 0.5s ease;
            display: grid;
            place-items: center;
        }
        .box:hover {
            transform: rotate(360deg) scale(1.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Belajar CSS Transition</h2>
        <h3>Arahkan kursor ke tombol di bawah ini</h3>

        <div class="btn">Hover</div>
    </div>
    <div class="section">
        <div class="card-container">
            <div class="card">
            <div class="card-front">
                <h3>Depan</h3>
            </div>
            <div class="card-back">
                <h3 >Belakang</h3>
            </div>
        </div>
    </div>
    <div class="section">
        <h2>Belajar CSS Transition</h2>
        <div class="box">
        <p>BOX</p>
    </div>
</body>
</html>
